services:
  app:
    build: .
    container_name: focus-app
    restart: unless-stopped
    ports:
      - "8181:3000"
    environment:
      - DATABASE_URL=postgresql://focus_user:focus_pass@db:5432/focus_db
      - TZ=America/New_York
    command: >
      sh -c "sleep 5 && npx prisma db push && node server.js"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: focus-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: focus_user
      POSTGRES_PASSWORD: focus_pass
      POSTGRES_DB: focus_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U focus_user -d focus_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: