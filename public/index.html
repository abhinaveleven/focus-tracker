<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Tracker</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f0f;
            --bg2: #1a1a1a;
            --bg3: #242424;
            --border: rgba(255, 255, 255, 0.08);
            --border2: rgba(255, 255, 255, 0.15);
            --text: #f0f0f0;
            --text2: #888;
            --text3: #555;
            --accent: #4ade80;
            --accent-dim: rgba(74, 222, 128, 0.12);
            --radius: 10px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem 4rem;
        }

        .datetime-display {
            font-size: 14px;
            color: var(--text2);
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 400;
        }

        .app {
            width: 100%;
            max-width: 520px;
        }

        h1 {
            font-size: 13px;
            font-weight: 500;
            color: var(--text3);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 2px;
            background: var(--bg2);
            border-radius: var(--radius);
            padding: 3px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 9px;
            border: none;
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            font-size: 13px;
            border-radius: 8px;
            transition: all 0.15s;
        }

        .tab.active {
            background: var(--bg3);
            color: var(--text);
            font-weight: 500;
        }

        /* Timer Area */
        .timer-display {
            text-align: center;
            padding: 3rem 0 2rem;
        }

        .time {
            font-size: 80px;
            font-weight: 200;
            letter-spacing: -3px;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .time.running {
            color: var(--accent);
        }

        .time.zero {
            color: var(--text3);
        }

        .session-hint {
            font-size: 13px;
            color: var(--text2);
            margin-top: 0.75rem;
            min-height: 20px;
        }

        /* Category Pills */
        .cats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 1.75rem;
        }

        .cat-pill {
            padding: 7px 16px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
        }

        .cat-pill.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 1.25rem;
        }

        .btn {
            padding: 12px 28px;
            border-radius: var(--radius);
            border: 1px solid var(--border2);
            background: var(--bg2);
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .btn.primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* Stats & History */
        .today-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 2rem;
        }

        .stat {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.875rem 1rem;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text3);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 500;
        }

        .day-group {
            margin-bottom: 1.5rem;
        }

        .day-head {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 8px;
        }

        .day-name {
            font-size: 12px;
            color: var(--text2);
            text-transform: uppercase;
        }

        .sess-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .sess-dur {
            margin-left: auto;
            color: var(--text2);
            font-size: 13px;
        }

        .del {
            background: none;
            border: none;
            color: var(--text3);
            cursor: pointer;
            font-size: 18px;
            margin-left: 10px;
        }

        .del:hover {
            color: #f87171;
        }
    </style>
</head>

<body>
    <div class="app">
        <h1>Focus Tracker</h1>
        <div id="datetime" class="datetime-display"></div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('timer')">Timer</button>
            <button class="tab" onclick="showTab('history')">History</button>
        </div>

        <div id="tab-timer">
            <div class="timer-display">
                <div class="time zero" id="display">00:00:00</div>
                <div class="session-hint" id="hint">Select a category</div>
            </div>

            <div class="cats" id="cat-row"></div>

            <div class="controls">
                <button class="btn primary" id="btn-start" onclick="actionTimer('start')" disabled>Start</button>
                <button class="btn" id="btn-pause" onclick="actionTimer('pause')" disabled>Pause</button>
                <button class="btn" id="btn-stop" onclick="actionTimer('stop')" disabled>Stop</button>
            </div>

            <div class="today-stats" id="today-stats"></div>
        </div>

        <div id="tab-history" style="display:none">
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        let state = {
            timerState: 'idle',
            elapsed: 0,
            startTs: null,
            pausedAt: null,
            category: null,
            sessions: []
        };
        let categories = [];
        let ticker = null;

        // --- Global Sync ---
        let serverLastModified = 0;

        async function syncTimerState() {
            try {
                const res = await fetch('/api/timer');
                const data = await res.json();
                if (data.lastModified > serverLastModified) {
                    serverLastModified = data.lastModified;
                    
                    state.timerState = data.state;
                    state.elapsed = data.elapsed;
                    state.startTs = data.startTs;
                    state.pausedAt = data.pausedAt;
                    state.category = data.category;
                    
                    if (state.timerState === 'running' || state.timerState === 'paused') {
                        if (!ticker) ticker = setInterval(renderDisplay, 50);
                    } else {
                        if (ticker) {
                            clearInterval(ticker);
                            ticker = null;
                        }
                    }
                    renderAll();
                }
            } catch (e) { console.error("Sync timer failed", e); }
        }

        async function updateServerTimer() {
            try {
                const res = await fetch('/api/timer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        state: state.timerState,
                        elapsed: state.elapsed,
                        startTs: state.startTs,
                        pausedAt: state.pausedAt,
                        category: state.category
                    })
                });
                const data = await res.json();
                serverLastModified = data.lastModified;
            } catch (e) { console.error("Failed to update timer on server."); }
        }

        // --- API Calls ---
        async function loadCategories() {
            const res = await fetch('/api/categories');
            categories = await res.json();
            renderCatPills();
            renderHistory();
        }

        async function addCategory() {
            const name = prompt("Enter new category name:");
            if (!name) return;
            const color = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            await fetch('/api/categories', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name.toLowerCase(), color })
            });
            await loadCategories();
        }

        async function loadSessions() {
            try {
                const res = await fetch('/api/sessions');
                state.sessions = await res.json();
                renderAll();
            } catch (e) { console.error("Sync failed", e); }
        }

        async function saveSession() {
            const durMs = getElapsedMs();
            const durSecs = Math.floor(durMs / 1000);

            if (durSecs > 0 && state.category) {
                try {
                    await fetch('/api/sessions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ category: state.category, duration: durSecs })
                    });
                } catch(e) { console.error("Failed to save to server."); }
            }

            state.timerState = 'idle';
            state.elapsed = 0; 
            state.startTs = null; 
            state.pausedAt = null;
            if (ticker) {
                clearInterval(ticker);
                ticker = null;
            }
            updateServerTimer();
            await loadSessions();
            showTab('history');
        }

        async function deleteSession(id) {
            if (!confirm("Delete session?")) return;
            await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
            loadSessions();
        }

        // --- Logic ---
        function getElapsedMs() {
            if (state.timerState === 'running') {
                return state.elapsed + (Date.now() - state.startTs);
            }
            return state.elapsed;
        }

        function actionTimer(action) {
            if (action === 'start') {
                if (state.timerState === 'idle') {
                    state.elapsed = 0;
                }
                state.timerState = 'running';
                state.startTs = Date.now();
                state.pausedAt = null;
                if (!ticker) ticker = setInterval(renderDisplay, 50);
                updateServerTimer();
                renderAll();
            } else if (action === 'pause') {
                if (state.timerState === 'running') {
                    state.elapsed = getElapsedMs();
                    state.timerState = 'paused';
                    state.startTs = null;
                    state.pausedAt = Date.now();
                }
                updateServerTimer();
                renderAll();
            } else if (action === 'stop') {
                saveSession();
            }
        }

        // --- Rendering ---
        function fmtShort(s) {
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            return h > 0 ? `${h}h ${m}m` : `${m}m`;
        }

        function renderDisplay() {
            const msTotal = getElapsedMs();
            const totalSeconds = Math.floor(msTotal / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            const ms = Math.floor((msTotal % 1000) / 10);

            let timeStr = "";
            if (hours > 0) {
                timeStr = [hours, minutes, seconds].map(v => String(v).padStart(2, '0')).join(':');
            } else if (minutes > 0) {
                timeStr = [minutes, seconds].map(v => String(v).padStart(2, '0')).join(':');
            } else {
                timeStr = String(seconds).padStart(2, '0') + ':' + String(ms).padStart(2, '0');
            }

            const el = document.getElementById('display');
            el.textContent = timeStr;
            el.className = 'time ' + (msTotal === 0 ? 'zero' : state.timerState === 'running' ? 'running' : '');

            const hint = document.getElementById('hint');
            if (state.timerState === 'paused' && state.pausedAt) {
                const pausedTime = Date.now() - state.pausedAt;
                const remaining = 20 * 60 * 1000 - pausedTime;
                if (remaining > 0) {
                    const rSecs = Math.floor(remaining / 1000);
                    const rMins = Math.floor(rSecs / 60);
                    const rSecsRem = rSecs % 60;
                    hint.textContent = `Auto-saving in ${rMins}:${String(rSecsRem).padStart(2, '0')}`;
                    hint.style.color = '#fb923c';
                } else {
                    hint.textContent = 'Auto-saving...';
                }
            } else {
                hint.textContent = 'Select a category';
                hint.style.color = 'var(--text2)';
                if (state.category && state.timerState === 'idle') hint.textContent = 'Ready to start';
                if (state.timerState === 'running') hint.textContent = 'Focusing...';
            }

            document.getElementById('btn-start').disabled = !state.category || state.timerState === 'running';
            document.getElementById('btn-pause').disabled = state.timerState !== 'running';
            document.getElementById('btn-stop').disabled = state.timerState === 'idle';
        }

        function renderCatPills() {
            const row = document.getElementById('cat-row');
            row.innerHTML = categories.map(c => `
                <button class="cat-pill ${state.category === c.name ? 'active' : ''}" 
                        onclick="setCat('${c.name}')" ${state.timerState !== 'idle' ? 'disabled' : ''}>
                ${c.name.charAt(0).toUpperCase() + c.name.slice(1)}
                </button>
            `).join('') + `
                <button class="cat-pill" onclick="addCategory()" ${state.timerState !== 'idle' ? 'disabled' : ''}>+</button>
            `;
        }

        function setCat(c) {
            state.category = c;
            updateServerTimer();
            renderAll();
        }

        function renderTodayStats() {
            const todayStr = new Date().toDateString();
            const todaySess = state.sessions.filter(s => new Date(s.ts).toDateString() === todayStr);
            const total = todaySess.reduce((a, b) => a + b.duration, 0);

            document.getElementById('today-stats').innerHTML = `
        <div class="stat"><div class="stat-label">Today</div><div class="stat-value">${fmtShort(total)}</div></div>
        <div class="stat"><div class="stat-label">Sessions</div><div class="stat-value">${todaySess.length}</div></div>
        <div class="stat"><div class="stat-label">Goal</div><div class="stat-value">--</div></div>
      `;
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const grouped = {};
            state.sessions.forEach(s => {
                const d = new Date(s.ts).toDateString();
                if (!grouped[d]) grouped[d] = [];
                grouped[d].push(s);
            });

            list.innerHTML = Object.entries(grouped).map(([date, sess]) => `
        <div class="day-group">
          <div class="day-head"><span class="day-name">${date}</span></div>
          ${sess.map(s => {
                const catInfo = categories.find(c => c.name === s.category) || {};
                const color = catInfo.color || '#555';
                return `
            <div class="sess-row">
              <div class="dot" style="background:${color}"></div>
              <div>
                <div style="font-size:14px; text-transform:capitalize">${s.category}</div>
                <div style="font-size:11px; color:var(--text3)">${new Date(s.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
              </div>
              <div class="sess-dur">${fmtShort(s.duration)}</div>
              <button class="del" onclick="deleteSession(${s.id})">×</button>
            </div>
          `}).join('')}
        </div>
      `).join('');
        }

        function renderAll() {
            renderDisplay();
            renderCatPills();
            renderTodayStats();
            renderHistory();
        }

        function showTab(t) {
            document.getElementById('tab-timer').style.display = t === 'timer' ? 'block' : 'none';
            document.getElementById('tab-history').style.display = t === 'history' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.textContent.toLowerCase() === t));
        }

        function updateDateTime() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' });
            document.getElementById('datetime').textContent = `Today is ${dateStr} ${timeStr}`;
        }
        
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // Initial Load
        loadCategories().then(() => {
            syncTimerState();
            setInterval(syncTimerState, 1500);
            loadSessions();
        });
    </script>
</body>

</html>
